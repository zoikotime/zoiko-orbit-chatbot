worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;

    # ── Upstream servers ──────────────────────────────────────────────────────
    upstream python_app {
        server 127.0.0.1:8000;  # FastAPI / uvicorn
    }

    upstream node_app {
        server 127.0.0.1:5000;  # Node.js / Express (server.js)
    }

    server {
        listen 8080;
        server_name _;

        # ── Node.js handles: email / callback ─────────────────────────────────
        location /send-request {
            proxy_pass         http://node_app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;

            # CORS — allow browser requests from any origin
            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── Node.js health ────────────────────────────────────────────────────
        location /node-health {
            proxy_pass http://node_app/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Python handles: /ui, /chat, /health, everything else ──────────────
        location / {
            proxy_pass         http://python_app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }
}
