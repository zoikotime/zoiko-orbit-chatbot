name: Zoiko Orbit Chatbot CI/CD

on:
push:
branches: [main]

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  # ── 1. Checkout code ───────────────────────────────────────────────
  - name: Checkout
    uses: actions/checkout@v3

  # ── 2. Authenticate with Google Cloud ─────────────────────────────
  - name: Authenticate to Google Cloud
    uses: google-github-actions/auth@v2
    with:
      credentials_json: ${{ secrets.GCP_SA_KEY }}

  # ── 3. Set up gcloud CLI ──────────────────────────────────────────
  - name: Set up Cloud SDK
    uses: google-github-actions/setup-gcloud@v2

  # ── 4. Configure Docker for Artifact Registry ─────────────────────
  - name: Configure Docker
    run: gcloud auth configure-docker europe-west1-docker.pkg.dev

  # ── 5. Build Docker image (FIXED: added IMAGE name "app") ─────────
  - name: Build Docker Image
    run: |
      docker build \
        -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko-orbit-chatbot/app:${{ github.sha }} \
        -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko-orbit-chatbot/app:latest \
        .

  # ── 6. Push Docker image ──────────────────────────────────────────
  - name: Push Docker Image
    run: |
      docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko-orbit-chatbot/app:${{ github.sha }}
      docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko-orbit-chatbot/app:latest

  # ── 7. Deploy to Cloud Run ────────────────────────────────────────
  - name: Deploy to Cloud Run
    run: |
      gcloud run deploy zoiko-orbit-chatbot \
        --image europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko-orbit-chatbot/app:${{ github.sha }} \
        --platform managed \
        --region europe-west1 \
        --allow-unauthenticated \
        --max-instances 3 \
        --port 8080 \
        --set-env-vars "SMTP_HOST=${{ secrets.SMTP_HOST }},SMTP_PORT=${{ secrets.SMTP_PORT }},SMTP_USER=${{ secrets.SMTP_USER }},SMTP_PASS=${{ secrets.SMTP_PASS }},SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}"

  # ── 8. Verify deployment ──────────────────────────────────────────
  - name: Verify Health Check
    run: |
      SERVICE_URL=$(gcloud run services describe zoiko-orbit-chatbot \
        --region europe-west1 \
        --format 'value(status.url)')
      
      echo "Service URL: $SERVICE_URL"

      curl -f "$SERVICE_URL/health" || exit 1

      echo "✅ Health check passed"
```
